name: CI

on:
  push:
    branches: [main]
  pull_request:

defaults:
  run:
    working-directory: agentflow

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: agentflow/go.mod
          cache-dependency-path: agentflow/go.sum

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...
