[pytest]
testpaths = tests
addopts = -v --tb=short --color=yes --durations=20
markers =
    embed: tests that require the local MLX embedding sidecar
    server: tests that require a full agentflow-serve (also implies DashScope key)
    cloud: tests that hit DashScope cloud (qwen-plus, qwen-vl-ocr-latest etc.) — slow + costs tokens
    slow: tests that take > 5 seconds end-to-end
    smoke: minimal sanity tests; should always pass first
filterwarnings =
    ignore::DeprecationWarning
